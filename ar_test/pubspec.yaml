name: ar_test
description: "Throwaway spike: verify Snapchat Camera Kit foot-tracking shoe try-on on a real device."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Snapchat Camera Kit wrapper for Flutter (live camera + real-time lens).
  # We build a Footwear Try-On lens in Lens Studio, publish it to our Camera Kit
  # app, and open it here by its lens GROUP ID. Snap actively maintains foot
  # tracking (unlike DeepAR, which removed it).
  camerakit_flutter: ^1.0.7
  # camera + mic permission at runtime
  permission_handler: ^11.0.0

flutter:
  uses-material-design: true
