name: ar_test
description: "Throwaway spike: verify DeepAR foot-tracking shoe try-on on a real device."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Official DeepAR webview shoe try-on plugin. This is the one that actually
  # FOOT-TRACKED the demo shoe on the device (DeepAR's web engine has foot
  # tracking; the native free .aar does not). It renders DeepAR's web player in a
  # WebView and takes a `.deepar` effect URL.
  deepar_shoe_try_on_flutter: ^1.0.2-beta
  # camera permission at runtime
  permission_handler: ^11.0.0

flutter:
  uses-material-design: true
