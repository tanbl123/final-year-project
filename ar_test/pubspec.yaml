name: ar_test
description: "Throwaway spike: verify DeepAR foot-tracking shoe try-on on a real device."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # We drive DeepAR's web shoe-player ourselves (same URL the official plugin
  # uses: https://try.deepar.ai/flutter/shoe?e=<effectUrl>), so we can display the
  # web engine's console + errors ON SCREEN to diagnose why the custom effect
  # hangs at "Loading AR". Uses the current webview_flutter (avoids the old
  # plugin's pinned-dependency build error).
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  # camera permission at runtime
  permission_handler: ^11.0.0

flutter:
  uses-material-design: true
