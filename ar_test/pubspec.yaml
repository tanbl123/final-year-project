name: ar_test
description: "Throwaway spike: verify DeepAR foot-tracking shoe try-on on a real device."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Maintained community fork of DeepAR's (abandoned) official Flutter plugin.
  deepar_flutter_plus: ^0.2.1
  # to download the .deepar effect from a URL, then hand its local path to DeepAR
  flutter_cache_manager: ^3.3.1
  # camera + mic permission at runtime
  permission_handler: ^11.0.0

flutter:
  uses-material-design: true
