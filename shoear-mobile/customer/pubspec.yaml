name: customer
description: ShoeAR customer app — browse, AR try-on, cart, checkout, track, review.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2              # talks to the PHP REST API
  provider: ^6.1.2          # simple state management (auth session)
  shared_preferences: ^2.3.2 # persists the JWT + basic user across launches
  flutter_stripe: ^11.1.0   # Stripe PaymentSheet for card checkout
  image_picker: ^1.1.2      # pick/take the profile photo
  firebase_core: ^3.6.0     # Firebase init (for push)
  firebase_messaging: ^15.1.3 # FCM background/foreground push
  google_sign_in: ^6.2.1    # Google OAuth sign-in (customer app only)
  pdf: ^3.11.1              # render the receipt to a PDF document
  printing: ^5.13.3         # OS print/share/save sheet for the receipt PDF
  camerakit_flutter: ^1.0.7  # Snapchat Camera Kit — AR foot-tracking shoe try-on
  permission_handler: ^11.0.0 # camera/mic permission for AR try-on

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1   # generates the launcher icons from a PNG

flutter:
  uses-material-design: true
  assets:
    - assets/data/my_postcodes.json
    - assets/branding/

# App launcher icon. Put a 1024x1024 PNG (the sneaker on the indigo tile) at
# assets/branding/app_icon.png, then run from this folder:
#   flutter pub get
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon.png"
  # Android adaptive icon: black fills the whole circle/squircle, the sneaker
  # (on its black tile) sits on top and blends seamlessly into that black.
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/branding/app_icon.png"
