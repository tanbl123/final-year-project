name: delivery
description: ShoeAR delivery personnel app — view assignments, update status, confirm with OTP, upload proof of delivery.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2               # talks to the PHP REST API
  provider: ^6.1.2           # simple state management (auth session)
  shared_preferences: ^2.3.2 # persists the JWT + basic user across launches
  image_picker: ^1.1.2       # take/pick the proof-of-delivery photo
  firebase_core: ^3.6.0      # Firebase initialisation (FCM push)
  firebase_messaging: ^15.1.3 # FCM background push notifications
  url_launcher: ^6.3.0       # open the Stripe payout onboarding link

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1   # generates the launcher icons from a PNG

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

# App launcher icon. Put a 1024x1024 PNG (the delivery truck on the indigo tile)
# at assets/branding/app_icon.png, then run from this folder:
#   flutter pub get
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon.png"
  # Android adaptive icon: black fills the whole circle/squircle, the truck
  # (on its black tile) sits on top and blends seamlessly into that black.
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/branding/app_icon.png"
